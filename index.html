<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Cổng Thanh Toán Tác Quyền Thực Tế</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 550px; width: 100%; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); border: 1px solid #334155; margin-top: 10px; box-sizing: border-box; }
        h1 { color: #a78bfa; text-align: center; font-size: 26px; margin-bottom: 5px; font-weight: 800; letter-spacing: 0.5px; }
        p.subtitle { text-align: center; color: #38bdf8; font-size: 14px; margin-bottom: 20px; font-weight: 500; }
        
        .guide-box { background: #020617; border: 1px dashed #475569; border-radius: 8px; padding: 12px 15px; margin-bottom: 20px; font-size: 13px; color: #94a3b8; }
        .guide-box strong { color: #f43f5e; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #cbd5e1; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; font-size: 15px; }
        
        .currency-block { display: flex; gap: 10px; }
        .currency-block input { flex: 2; }
        .currency-block select { flex: 1; }

        button { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4); }
        .btn-primary:hover { background: linear-gradient(135deg, #059669, #047857); transform: translateY(-1px); }
        .btn-secondary { background: #334155; border: 1px solid #475569; margin-top: 12px; color: #e2e8f0; font-size: 14px; padding: 10px; }
        
        .result-box { margin-top: 20px; padding: 18px; background: #020617; border-radius: 10px; border-left: 5px solid #10b981; display: none; text-align: center; }
        .qr-container { background: white; padding: 15px; display: inline-block; border-radius: 12px; margin: 15px 0; }
        .qr-container img { max-width: 220px; width: 100%; height: auto; display: block; }
        
        .invoice-details { text-align: left; margin-top: 15px; font-size: 13px; border-top: 1px dashed #334155; padding-top: 10px; }
        .invoice-line { display: flex; justify-content: space-between; padding: 3px 0; }
        
        .log-area { max-height: 180px; overflow-y: auto; background: #020617; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #334155; font-family: monospace; font-size: 11px; color: #38bdf8; display: none; width: 100%; box-sizing: border-box; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SIA PRODUCTION V5</h1>
        <p class="subtitle">Cổng Thanh Toán Tác Quyền & Xuất Mã QR Ngân Hàng MB</p>
        
        <div class="guide-box">
            💰 <strong>Cấu hình thụ hưởng thực tế:</strong><br>
            • Đơn vị vận hành: <strong>VU VAN TRONG</strong><br>
            • Hệ thống ngân hàng kết nối: <strong>Ngân hàng Quân Đội (MB)</strong>
        </div>
        
        <div class="form-group">
            <label>💼 Loại Hình Khai Thác Bản Quyền</label>
            <select id="actionType">
                <option value="AI_TRAINING">🤖 Sử dụng dữ liệu huấn luyện các mô hình AI</option>
                <option value="COMMERCIAL_USE">🏢 Khai thác thương mại / Tập đoàn Big Tech</option>
                <option value="API_CALL">⚡ Truy vấn dữ liệu cốt lõi qua hệ thống API</option>
            </select>
        </div>

        <div class="form-group">
            <label>💵 Nhập Số Tiền Cần Thanh Toán</label>
            <div class="currency-block">
                <input type="number" id="amount" value="50000">
                <select id="currency">
                    <option value="VND">VND (Tài khoản Lõi)</option>
                    <option value="USD">USD (Tài khoản Ngoại Tệ)</option>
                    <option value="EUR">EUR (Tài khoản Ngoại Tệ)</option>
                </select>
            </div>
        </div>

        <button class="btn-primary" onclick="generateSIAPayment()">
            ⚡ Khởi Tạo Mã QR Nhận Tiền Thật (MB Bank)
        </button>
        
        <button class="btn-secondary" onclick="fetchSystemLogs()">
            📊 Kiểm Toán Lịch Sử Giao Dịch Hệ Thống
        </button>

        <div id="resultBox" class="result-box">
            <h3 style="color: #34d399; margin-top: 0;">💵 MÃ QR QUÉT THANH TOÁN THỰC TẾ</h3>
            <p style="font-size: 13px; color: #94a3b8; margin-bottom: 5px;" id="paymentMessage"></p>
            
            <div class="qr-container">
                <img id="qrImage" src="" alt="Mã QR Thanh Toán MB">
            </div>
            
            <p style="font-size: 12px; color: #f43f5e; margin-top: 0; font-weight: bold;">⚠️ Sử dụng ứng dụng Ngân hàng (App Banking) quét mã để chuyển tiền thật</p>

            <div class="invoice-details" id="invoiceDetails"></div>
        </div>

        <div id="logArea" class="log-area"></div>
    </div>

    <script>
        const baseUrl = 'https://sia-project-wghg.onrender.com';
        const siaKey = 'SIA-SUPER-KEY-2026';

        async function generateSIAPayment() {
            const actionType = document.getElementById('actionType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const resultBox = document.getElementById('resultBox');
            const qrImage = document.getElementById('qrImage');
            const paymentMessage = document.getElementById('paymentMessage');
            const invoiceDetails = document.getElementById('invoiceDetails');

            resultBox.style.display = 'block';
            paymentMessage.innerText = 'Đang khởi tạo mã QR từ máy chủ ngân hàng MB...';
            qrImage.src = '';

            try {
                const response = await fetch(`${baseUrl}/api/v1/royalty`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action_type: actionType, amount: amount, currency: currency, sia_key: siaKey })
                });
                const data = await response.json();
                
                if (response.ok) {
                    paymentMessage.innerHTML = `Chuyển về số tài khoản: <strong>${data.account_no}</strong><br>Tên người nhận: <strong>${data.account_name}</strong>`;
                    qrImage.src = data.qr_url;
                    
                    invoiceDetails.innerHTML = `
                        <div class="invoice-line"><span>Tổng Số Tiền:</span><strong>${data.total_amount.toLocaleString()} ${data.currency}</strong></div>
                        <div class="invoice-line" style="color: #60a5fa;"><span>👥 Quỹ Lập Trình Viên (70%):</span><span>${data.share_dev.toLocaleString()} ${data.currency}</span></div>
                        <div class="invoice-line" style="color: #fca5a5;"><span>☁️ Hạ Tầng Máy Chủ (20%):</span><span>${data.share_hardware.toLocaleString()} ${data.currency}</span></div>
                        <div class="invoice-line" style="color: #fef08a;"><span>🛡️ Quỹ Dự Phòng Hệ Thống (10%):</span><span>${data.share_reserve.toLocaleString()} ${data.currency}</span></div>
                        <div style="font-size: 10px; color: #475569; text-align: right; margin-top: 10px;">Mã chuẩn hóa Napas • ${data.timestamp}</div>
                    `;
                } else {
                    paymentMessage.innerText = 'Từ chối khởi tạo: ' + data.message;
                }
            } catch (err) {
                paymentMessage.innerText = 'Lỗi kết nối tới máy chủ thanh toán.';
            }
        }

        async function fetchSystemLogs() {
            const logArea = document.getElementById('logArea');
            logArea.style.display = 'block';
            logArea.innerText = '⏳ Đang truy xuất dữ liệu sổ cái...';

            try {
                const response = await fetch(`${baseUrl}/api/v1/logs`);
                const data = await response.json();
                logArea.innerText = data.logs;
            } catch (err) {
                logArea.innerText = '❌ Lỗi trích xuất tệp nhật ký.';
            }
        }
    </script>
</body>
</html>
