<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Nền Tảng Thương Mại Tác Quyền Toàn Phần</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 550px; width: 100%; background: #1e293b; padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); border: 1px solid #334155; margin-top: 10px; box-sizing: border-box; }
        h1 { color: #a78bfa; text-align: center; font-size: 26px; margin-bottom: 5px; font-weight: 800; letter-spacing: 0.5px; }
        p.subtitle { text-align: center; color: #38bdf8; font-size: 14px; margin-bottom: 20px; font-weight: 500; }
        
        .section-title { font-size: 15px; color: #f43f5e; font-weight: bold; margin: 15px 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;}
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #cbd5e1; font-weight: 600; }
        input, select { width: 100%; padding: 11px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus { border-color: #38bdf8; outline: none; }
        
        .currency-block { display: flex; gap: 10px; }
        .currency-block input { flex: 2; }
        .currency-block select { flex: 1; }

        button { width: 100%; padding: 14px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4); }
        .btn-primary:hover { background: linear-gradient(135deg, #059669, #047857); transform: translateY(-1px); }
        .btn-secondary { background: #334155; border: 1px solid #475569; margin-top: 12px; color: #e2e8f0; font-size: 14px; padding: 10px; }
        
        .result-box { margin-top: 20px; padding: 18px; background: #020617; border-radius: 10px; border-left: 5px solid #10b981; display: none; text-align: center; }
        .qr-container { background: white; padding: 15px; display: inline-block; border-radius: 12px; margin: 15px 0; }
        .qr-container img { max-width: 220px; width: 100%; height: auto; display: block; }
        
        .invoice-details { text-align: left; margin-top: 15px; font-size: 13px; border-top: 1px dashed #334155; padding-top: 10px; line-height: 1.6; }
        .invoice-line { display: flex; justify-content: space-between; padding: 3px 0; }
        .log-area { max-height: 180px; overflow-y: auto; background: #020617; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1px solid #334155; font-family: monospace; font-size: 11px; color: #38bdf8; display: none; width: 100%; box-sizing: border-box; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SIA COMMERCIAL V6</h1>
        <p class="subtitle">Hệ Thống Quản Lý Đối Tác & Khởi Tạo Hợp Đồng Tác Quyền</p>
        
        <div class="section-title">📋 Bước 1: Khai báo hồ sơ khách hàng</div>
        
        <div class="form-group">
            <label>🏢 Tên Công ty / Tập đoàn / Cá nhân đối tác</label>
            <input type="text" id="clientName" placeholder="Ví dụ: Tập đoàn Công nghệ Vingroup, Microsoft...">
        </div>
        
        <div class="form-group">
            <label>📞 Số điện thoại liên hệ trực tiếp</label>
            <input type="text" id="clientPhone" placeholder="Ví dụ: 0912345678">
        </div>
        
        <div class="form-group">
            <label>📍 Địa chỉ trụ sở chính / Email nhận hồ sơ</label>
            <input type="text" id="clientAddress" placeholder="Ví dụ: Số 7 Bằng Lăng, Hà Nội / contact@domain.com">
        </div>

        <div class="section-title">💰 Bước 2: Cấu hình gói tác quyền thương mại</div>
        
        <div class="form-group">
            <label>💼 Loại Hình Khai Thác Bản Quyền</label>
            <select id="actionType">
                <option value="AI_TRAINING">🤖 Sử dụng dữ liệu huấn luyện các mô hình AI</option>
                <option value="COMMERCIAL_USE">🏢 Khai thác thương mại / Tập đoàn Big Tech</option>
                <option value="API_CALL">⚡ Truy vấn dữ liệu cốt lõi qua hệ thống API</option>
            </select>
        </div>

        <div class="form-group">
            <label>💵 Nhập Số Tiền Cần Thanh Toán</label>
            <div class="currency-block">
                <input type="number" id="amount" value="50000">
                <select id="currency">
                    <option value="VND">VND (Tài khoản Lõi)</option>
                    <option value="USD">USD (Tài khoản Ngoại Tệ)</option>
                    <option value="EUR">EUR (Tài khoản Ngoại Tệ)</option>
                </select>
            </div>
        </div>

        <button class="btn-primary" onclick="generateSIAPayment()">
            ⚡ Ký Hợp Đồng & Khởi Tạo Mã QR Thanh Toán
        </button>
        
        <button class="btn-secondary" onclick="fetchSystemLogs()">
            📊 Kiểm Toán Lịch Sử Giao Dịch Hệ Thống
        </button>

        <div id="resultBox" class="result-box">
            <h3 style="color: #34d399; margin-top: 0;">💵 MÃ QR THANH TOÁN THỰC TẾ</h3>
            <p style="font-size: 13px; color: #94a3b8; margin-bottom: 5px;" id="paymentMessage"></p>
            
            <div class="qr-container">
                <img id="qrImage" src="" alt="Mã QR Thanh Toán MB">
            </div>
            
            <p style="font-size: 12px; color: #f43f5e; margin-top: 0; font-weight: bold;">⚠️ Sử dụng ứng dụng Ngân hàng quét mã để thực hiện giao dịch pháp lý</p>

            <div class="invoice-details" id="invoiceDetails"></div>
        </div>

        <div id="logArea" class="log-area"></div>
    </div>

    <script>
        const baseUrl = 'https://sia-project-wghg.onrender.com';
        const siaKey = 'SIA-SUPER-KEY-2026';

        async function generateSIAPayment() {
            const clientName = document.getElementById('clientName').value.trim();
            const clientPhone = document.getElementById('clientPhone').value.trim();
            const clientAddress = document.getElementById('clientAddress').value.trim();
            
            const actionType = document.getElementById('actionType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            
            const resultBox = document.getElementById('resultBox');
            const qrImage = document.getElementById('qrImage');
            const paymentMessage = document.getElementById('paymentMessage');
            const invoiceDetails = document.getElementById('invoiceDetails');

            // Ràng buộc bắt buộc khách hàng điền danh tính trước khi cho thanh toán
            if (!clientName || !clientPhone || !clientAddress) {
                alert("⚠️ Vui lòng điền đầy đủ Tên, Số điện thoại và Địa chỉ để hệ thống xác minh danh tính hợp đồng!");
                return;
            }

            resultBox.style.display = 'block';
            paymentMessage.innerText = 'Hệ thống SIA đang đăng ký hồ sơ doanh nghiệp và tạo mã QR ngân hàng...';
            qrImage.src = '';

            // Tự động gộp thông tin khách hàng vào nội dung chuyển khoản để ngân hàng lưu giữ
            const memoInfo = `SIA_${clientPhone}_${actionType}`;

            // Tạo mã QR ngân hàng thụ hưởng MB chính chủ VU VAN TRONG
            let targetAccount = "1005071981"; 
            if (currency === "USD") targetAccount = "6801639330636";
            else if (currency === "EUR") targetAccount = "5120703663032";

            const qrCodeURL = `https://img.vietqr.io/image/MB-${targetAccount}-qr_only.png?amount=${amount}&addInfo=${memoInfo}`;
            
            const shareDev = amount * 0.7;
            const shareHardware = amount * 0.2;
            const shareReserve = amount * 0.1;
            const currentTimestamp = new Date().toLocaleString();

            paymentMessage.innerHTML = `Chuyển về số tài khoản: <strong>${targetAccount}</strong><br>Người nhận: <strong>VU VAN TRONG</strong>`;
            qrImage.src = qrCodeURL;
            
            invoiceDetails.innerHTML = `
                <div style="background: #0f172a; padding: 10px; border-radius: 6px; margin-bottom: 10px; border: 1px dashed #334155;">
                    <strong style="color: #a78bfa;">📝 HỒ SƠ ĐỐI TÁC HỢP ĐỒNG:</strong><br>
                    • Khách hàng: <span style="color: white;">${clientName}</span><br>
                    • Hotline: <span style="color: white;">${clientPhone}</span><br>
                    • Trụ sở / Email: <span style="color: white;">${clientAddress}</span>
                </div>
                <div class="invoice-line"><span>Tổng Số Tiền Tác Quyền:</span><strong>${amount.toLocaleString()} ${currency}</strong></div>
                <div class="invoice-line" style="color: #60a5fa;"><span>👥 Quỹ Lập Trình Viên (70%):</span><span>${shareDev.toLocaleString()} ${currency}</span></div>
                <div class="invoice-line" style="color: #fca5a5;"><span>☁️ Hạ Tầng Máy Chủ (20%):</span><span>${shareHardware.toLocaleString()} ${currency}</span></div>
                <div class="invoice-line" style="color: #fef08a;"><span>🛡️ Quỹ Dự Phòng Hệ Thống (10%):</span><span>${shareReserve.toLocaleString()} ${currency}</span></div>
                <div style="font-size: 10px; color: #475569; text-align: right; margin-top: 10px;">Mã định danh bảo mật • Hợp đồng số: SIA-${Date.now().toString().slice(-6)}</div>
            `;
        }

        async function fetchSystemLogs() {
            const logArea = document.getElementById('logArea');
            logArea.style.display = 'block';
            logArea.innerText = '⏳ Đang truy xuất dữ liệu sổ cái kiểm toán thương mại...';

            try {
                const response = await fetch(`${baseUrl}/api/v1/logs`);
                const data = await response.json();
                logArea.innerText = data.logs;
            } catch (err) {
                logArea.innerText = '❌ Lỗi trích xuất tệp nhật ký.';
            }
        }
    </script>
</body>
</html>
